services:
  db:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5437}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - /www/wwwroot/NZAT.NET/db/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  emqx:
    image: emqx/emqx:latest
    restart: unless-stopped
    environment:
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USERNAME:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASSWORD:-change-me}
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${EMQX_DASHBOARD_PORT:-18083}:18083"

  api:
    image: ghcr.io/lynn61liu/nzat-api:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__Default: ${DB_CONN_STRING}
      ConnectionStrings__Carjam: ${DB_CONN_STRING}
      ConnectionStrings__Redis: ${REDIS_CONN_STRING}
      Redis__InstanceName: ${REDIS_INSTANCE_NAME:-workshop-api:}
      CUPS_SERVER: ${CUPS_SERVER:-/run/cups/cups.sock}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      Gmail__ClientId: ${GMAIL_CLIENT_ID}
      Gmail__ClientSecret: ${GMAIL_CLIENT_SECRET}
      Gmail__RedirectUri: ${GMAIL_REDIRECT_URI}
      Xero__ClientId: ${XERO_CLIENT_ID}
      Xero__ClientSecret: ${XERO_CLIENT_SECRET}
      Xero__RedirectUri: ${XERO_REDIRECT_URI}
      Xero__Scopes: ${XERO_SCOPES:-}
      XeroWebhook__SigningKey: ${XERO_WEBHOOK_SIGNING_KEY:-}
      XeroPayments__DefaultAccountCode: ${XERO_PAYMENTS_DEFAULT_ACCOUNT_CODE:-}
      XeroPayments__CashAccountCode: ${XERO_PAYMENTS_CASH_ACCOUNT_CODE:-}
      XeroPayments__EpostAccountCode: ${XERO_PAYMENTS_EPOST_ACCOUNT_CODE:-}
      XeroPayments__BankTransferAccountCode: ${XERO_PAYMENTS_BANK_TRANSFER_ACCOUNT_CODE:-}
      ImageOcr__Enabled: ${IMAGE_OCR_ENABLED:-false}
      GmailSync__Enabled: ${GMAIL_SYNC_ENABLED:-true}
      PoFollowUp__Enabled: ${PO_FOLLOW_UP_ENABLED:-false}
      XeroPolling__Enabled: ${XERO_POLLING_ENABLED:-true}
      EStationMqtt__Enabled: ${ESTATION_MQTT_ENABLED:-false}
      EStationMqtt__BrokerHost: ${ESTATION_MQTT_BROKER_HOST:-emqx}
      EStationMqtt__BrokerPort: ${ESTATION_MQTT_BROKER_PORT:-1883}
      EStationMqtt__Username: ${ESTATION_MQTT_USERNAME:-}
      EStationMqtt__Password: ${ESTATION_MQTT_PASSWORD:-}
      EStationMqtt__UseTls: ${ESTATION_MQTT_USE_TLS:-false}
    depends_on:
      - db
      - redis
      - emqx
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ${CUPS_SOCKET_PATH:-/run/cups/cups.sock}:/run/cups/cups.sock
      - api_data:/app/App_Data

  web:
    image: ghcr.io/lynn61liu/nzat-web:latest
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-5173}:80"

volumes:
  db_data:
  api_data:
  redis_data:
